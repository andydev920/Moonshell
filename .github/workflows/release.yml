name: release

# Builds Moonshell for macOS (signed + notarized Universal: Apple Silicon + Intel)
# and Windows (NSIS .exe installer, unsigned), then publishes one draft GitHub
# Release with every installer attached.
#
# Trigger: push a version tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
#
# Required repository secrets (Settings -> Secrets and variables -> Actions) — macOS only:
#   APPLE_CERTIFICATE           base64 of your Developer ID Application .p12
#                               ( base64 -i cert.p12 | pbcopy )
#   APPLE_CERTIFICATE_PASSWORD  password set when exporting the .p12
#   APPLE_SIGNING_IDENTITY      e.g. "Developer ID Application: Your Name (TEAMID)"
#   KEYCHAIN_PASSWORD           any throwaway string (unlocks the temp CI keychain)
#   APPLE_ID                    your Apple Developer account email
#   APPLE_PASSWORD              an app-specific password (appleid.apple.com)
#   APPLE_TEAM_ID               10-char Team ID
# Alternative to the last three (App Store Connect API key): set instead
#   APPLE_API_ISSUER, APPLE_API_KEY, APPLE_API_KEY_PATH  — see README "签名打包 / 发布"
#
# Windows is built unsigned: SmartScreen will warn ("unknown publisher") on first
# run until you add an Authenticode code-signing certificate.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create the draft release once, up front, so both platform builds upload into
  # the same release instead of racing to create it.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const owner = context.repo.owner, repo = context.repo.repo;
            // Reuse an existing draft for this tag if present (so re-running the tag
            // doesn't 422); getReleaseByTag only returns published releases, so list.
            const all = await github.paginate(github.rest.repos.listReleases, { owner, repo, per_page: 100 });
            let rel = all.find(r => r.tag_name === tag);
            if (!rel) {
              const { data } = await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `Moonshell ${tag}`, draft: true, prerelease: false,
              });
              rel = data;
            }
            return rel.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest
            rust_targets: ""
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    # Mapped to env so the optional Windows signing step can gate on it
    # (the `secrets` context isn't allowed directly in step `if:`).
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup reads it from package.json "packageManager"
      # (pnpm@10.x). Pinning a different version here causes ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Runs only when the cert secret exists; otherwise macOS builds unsigned
      # (so a missing Apple cert doesn't fail the run — Windows still ships).
      - name: Import Apple Developer certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Optional Windows Authenticode signing. Runs ONLY when the WINDOWS_CERTIFICATE
      # secret is set; otherwise the .exe ships unsigned (SmartScreen warns). To enable,
      # add repo secrets WINDOWS_CERTIFICATE (base64 of your .pfx) and
      # WINDOWS_CERTIFICATE_PASSWORD. We import the cert, read its thumbprint, and inject
      # certificateThumbprint/digestAlgorithm/timestampUrl into tauri.conf.json so the
      # subsequent Tauri build signs the bundle.
      - name: Set up Windows code signing
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pwd = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item cert.pfx
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          if (-not $conf.bundle.windows) { $conf.bundle | Add-Member -Name windows -Value (@{}) -MemberType NoteProperty }
          $conf.bundle.windows | Add-Member -Name certificateThumbprint -Value $cert.Thumbprint -MemberType NoteProperty -Force
          $conf.bundle.windows | Add-Member -Name digestAlgorithm -Value 'sha256' -MemberType NoteProperty -Force
          $conf.bundle.windows | Add-Member -Name timestampUrl -Value 'http://timestamp.digicert.com' -MemberType NoteProperty -Force
          $conf | ConvertTo-Json -Depth 32 | Set-Content src-tauri/tauri.conf.json -Encoding utf8
          Write-Host "Signing enabled with thumbprint $($cert.Thumbprint)"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
